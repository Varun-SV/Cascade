# Cascade Configuration
# Copy this file to ./cascade.yaml or ~/.cascade/config.yaml and tailor it to your stack.

default_planner: planner
default_auditor: local

models:
  - id: planner
    provider: anthropic
    model: claude-sonnet-4-20250514
    temperature: 0.3
    max_tokens: 8192
    context_window: 200000
    fallback_models: [worker, local]
    benchmark_tags: [planning, coding]

  - id: worker
    provider: openai
    model: gpt-4o-mini
    temperature: 0.2
    max_tokens: 4096
    context_window: 128000
    fallback_models: [local]
    benchmark_tags: [editing, testing]

  - id: local
    provider: ollama
    model: qwen2.5-coder:7b
    temperature: 0.1
    max_tokens: 4096
    context_window: 32768
    benchmark_tags: [local, summarization]

api_keys:
  anthropic: ""    # or set CASCADE_ANTHROPIC_API_KEY env var
  openai: ""       # or set CASCADE_OPENAI_API_KEY env var
  google: ""       # or set CASCADE_GOOGLE_API_KEY env var

ollama:
  base_url: "http://localhost:11434"

# Azure OpenAI: multiple endpoints, each with its own resource + deployment.
# Each entry can reference a different Azure resource or deployment.
# Set api_key here or via CASCADE_AZURE_<NAME>_API_KEY environment variable.
#
# azure_endpoints:
#   - name: eastus-gpt4o
#     base_url: "https://my-resource.openai.azure.com"
#     api_key: ""    # or CASCADE_AZURE_EASTUS_GPT4O_API_KEY
#     api_version: "2024-02-01"
#     deployment_name: "gpt-4o"
#
#   - name: westus-gpt4o-mini
#     base_url: "https://my-resource-2.openai.azure.com"
#     api_key: ""    # or CASCADE_AZURE_WESTUS_GPT4O_MINI_API_KEY
#     api_version: "2024-08-01-preview"
#     deployment_name: "gpt-4o-mini"
#
# Then reference an endpoint in a model entry:
#   - id: azure-worker
#     provider: azure
#     azure_endpoint: eastus-gpt4o
#     model: gpt-4o          # used for pricing lookup only
#     temperature: 0.2
#     max_tokens: 4096

escalation:
  confidence_threshold: 0.5
  max_retries: 2

budget:
  enabled: false
  session_max_cost: null
  task_max_cost: null
  ledger_path: "~/.cascade/state.db"
  estimation_enabled: true
  estimation_warn_threshold: 1.0
  tier_max_costs: {}
  model_max_cost: {}

approvals:
  mode: guarded   # auto | guarded | strict
  allowed_command_prefixes:
    - ["pytest"]
    - ["git", "status"]
    - ["python", "-m", "pytest"]

runtime:
  max_reflections: 3
  stream_events: true
  preflight_confirmation: true
  retry_reflection_enabled: true

observability:
  trace_dir: ".cascade/traces"
  journal_path: ".cascade/journal.log"
  otel_enabled: false
  otel_exporter: ""

plugins:
  registry_path: "~/.cascade/plugins.json"
  enabled_packages: []
  auto_load: true
  strategy: default

semantic_search:
  enabled: true
  ollama_embedding_model: "nomic-embed-text"
  base_url: "http://localhost:11434"

project_root: "."
verbose: false
log_file: null
