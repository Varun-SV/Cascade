# Cascade Configuration
# Copy this to ~/.cascade/config.yaml or ./cascade.yaml

# ── Dynamic Model Pool ──────────────────────────────────────────────
# Define the models available to Cascade. The root agent will assign 
# these models to children it spawns.
default_planner: planner
default_auditor: local

models:
  - id: planner
    provider: anthropic           # anthropic | openai | google | ollama
    model: claude-sonnet-4-20250514
    temperature: 0.3
    max_tokens: 8192

  - id: worker
    provider: anthropic
    model: claude-sonnet-4-20250514
    temperature: 0.2
    max_tokens: 4096

  - id: local
    provider: ollama
    model: qwen2.5-coder:7b       # Local SLM via Ollama
    temperature: 0.1
    max_tokens: 2048

# ── API Keys ────────────────────────────────────────────────────────
# Keys can also be set via environment variables:
#   CASCADE_ANTHROPIC_API_KEY, CASCADE_OPENAI_API_KEY, CASCADE_GOOGLE_API_KEY
api_keys:
  anthropic: ""                   # Or set CASCADE_ANTHROPIC_API_KEY env var
  openai: ""                      # Or set CASCADE_OPENAI_API_KEY env var
  google: ""                      # Or set CASCADE_GOOGLE_API_KEY env var

# Ollama settings (no API key needed)
ollama:
  base_url: "http://localhost:11434"

# ── Escalation Thresholds ───────────────────────────────────────────
# If an agent drops below this confidence or hits max retries, it gives up
# and escalates back to its parent agent.
escalation:
  confidence_threshold: 0.5
  max_retries: 2

# ── Cost Budgets (optional) ─────────────────────────────────────────
# Set to null or remove to disable budget tracking
budget:
  enabled: false
  session_max_cost: null           # Total across all models

# ── General ─────────────────────────────────────────────────────────
project_root: "."                 # Sandbox root for file operations
verbose: false
log_file: null                    # e.g., "~/.cascade/cascade.log"
