# Cascade Configuration
# Copy this to ~/.cascade/config.yaml or ./cascade.yaml

# ── Model Assignments ───────────────────────────────────────────────
tiers:
  t1_orchestrator:
    provider: anthropic           # anthropic | openai | google | ollama
    model: claude-sonnet-4-20250514           # Model name for this tier
    temperature: 0.3
    max_tokens: 8192

  t2_worker:
    provider: anthropic
    model: claude-sonnet-4-20250514
    temperature: 0.2
    max_tokens: 4096

  t3_executor:
    provider: ollama
    model: qwen2.5-coder:7b       # Local SLM via Ollama
    temperature: 0.1
    max_tokens: 2048

# ── API Keys ────────────────────────────────────────────────────────
# Keys can also be set via environment variables:
#   CASCADE_ANTHROPIC_API_KEY, CASCADE_OPENAI_API_KEY, CASCADE_GOOGLE_API_KEY
api_keys:
  anthropic: ""                   # Or set CASCADE_ANTHROPIC_API_KEY env var
  openai: ""                      # Or set CASCADE_OPENAI_API_KEY env var
  google: ""                      # Or set CASCADE_GOOGLE_API_KEY env var

# Ollama settings (no API key needed)
ollama:
  base_url: "http://localhost:11434"

# ── Escalation Thresholds ───────────────────────────────────────────
escalation:
  t3_confidence_threshold: 0.6    # T3 escalates to T2 if confidence < this
  t2_confidence_threshold: 0.5    # T2 escalates to T1 if confidence < this
  max_retries_before_escalation: 2 # Failures before escalating

# ── Cost Budgets (optional) ─────────────────────────────────────────
# Set to null or remove to disable budget tracking
budget:
  enabled: false
  t1_max_cost: null               # e.g., 1.00 (dollars per session)
  t2_max_cost: null               # e.g., 0.50
  t3_max_cost: null               # Always 0 for local models
  session_max_cost: null           # Total across all tiers

# ── Tool Permissions ────────────────────────────────────────────────
tools:
  t3_allowed:
    - read_file
    - list_directory
    - grep_search
    - find_files
  t2_allowed:
    - read_file
    - write_file
    - edit_file
    - list_directory
    - run_command
    - grep_search
    - find_files
    - git_status
    - git_diff
    - git_log
    - git_commit
    - fetch_url
    - web_search
  t1_allowed: all                 # T1 can use any tool

# ── General ─────────────────────────────────────────────────────────
project_root: "."                 # Sandbox root for file operations
verbose: false
log_file: null                    # e.g., "~/.cascade/cascade.log"
